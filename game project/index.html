<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏图标</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-icon-container">
        <div id="game-icon" onclick="openGame()">

            <div class="game-title">我的游戏</div>
        </div>
    </div>
    

    
    <script src="script.js"></script>
</body>
</html>
